# HTTP → HTTPS redirect
server {
    listen 80;
    server_name instaflow.pro www.instaflow.pro;
    return 301 https://instaflow.pro$request_uri;
}

# Frontend HTTPS
server {
    listen 443 ssl;
    server_name instaflow.pro www.instaflow.pro;

    ssl_certificate     /etc/letsencrypt/live/instaflow.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/instaflow.pro/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 500M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}

# Backend HTTPS proxy (porta 3001 → backend:3000)
server {
    listen 3001 ssl;
    server_name instaflow.pro;

    ssl_certificate     /etc/letsencrypt/live/instaflow.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/instaflow.pro/privkey.pem;

    client_max_body_size 500M;

    location /events {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
